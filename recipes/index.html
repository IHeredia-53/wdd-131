<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>RecipeBook</title>
  <meta name="description" content="Browse delicious recipes and discover your next favorite meal.">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="RecipeBook">
  <meta property="og:description" content="Browse delicious recipes and discover your next favorite meal.">
  <meta property="og:url" content="https://your-domain.com/">
  <meta property="og:image" content="images/social-preview-image.png">

  <!-- X (Twitter) -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RecipeBook">
  <meta name="twitter:description" content="Browse delicious recipes and discover your next favorite meal.">
  <meta name="twitter:image" content="images/social-preview-image.png">

  <!-- Icons -->
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="logo-section">
    <img src="recipe-book.png" alt="Recipe Book logo">
    <h1>RecipeBook</h1>
  </header>

  <main>

    <form class="search-bar">
      <input
        type="search"
        placeholder="Find a recipe"
        aria-label="Search recipes"
      >
      <button type="submit">
        <img src="search.svg" alt="Search">
      </button>
    </form>

    <section class="recipe-card">

      <img
        class="recipe-image"
        src="apple-crisp.jpg"
        alt="Apple Crisp served with vanilla ice cream"
      >

      <div class="recipe-content">

        <span class="tag">dessert</span>

        <h2>Apple Crisp</h2>

        <span
          class="rating"
          role="img"
          aria-label="Rating: 4 out of 5 stars"
        >
          <span aria-hidden="true">⭐</span>
          <span aria-hidden="true">⭐</span>
          <span aria-hidden="true">⭐</span>
          <span aria-hidden="true">⭐</span>
          <span aria-hidden="true">☆</span>
        </span>

        <p class="description">
          This apple crisp recipe is a simple yet delicious fall dessert
          that's great served warm with vanilla ice cream.
        </p>

      </div>

    </section>

  </main>

  <footer>

    <a
      href="https://www.flaticon.com/free-icons/recipe"
      title="recipe icons"
    >
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
      <a href="#"><img src="instagram_icon.svg" alt="Instagram"></a>
      <a href="#"><img src="youtube_icon.svg" alt="YouTube"></a>
      <a href="#"><img src="pinterest_icon.svg" alt="Pinterest"></a>
    </div>

  </footer>

</body>
</html>
